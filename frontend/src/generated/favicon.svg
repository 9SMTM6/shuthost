<svg height="400" viewBox="0 0 400 400" width="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="dropShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.28"/>
    </filter>
    <style><![CDATA[
      .m{fill:none;stroke:#2b2b2b;stroke-width:18;stroke-linecap:round;stroke-linejoin:round;filter:url(#dropShadow)}
      .f{fill:#2b2b2b}
      @media(prefers-color-scheme:dark){.m{stroke:#e6e6e6}.f{fill:#e6e6e6}}
    ]]></style>
  </defs>
  <g class="m">
    <!-- left quarter-arc: from the left side up to arcEndX (trimmed from notch edge) -->
    <path d="M 72 249 A 128 128 0 0 1 170 124.56527815758176"/>
    <!-- right quarter-arc: from arcStartX (trimmed from notch edge) down to the right side -->
    <path d="M 230 124.56527815758176 A 128 128 0 0 1 328 249"/>
    <!-- power-button stem (bottom is stemAboveRect above rectTop, height is stemHeight) -->
    <line x1="200" y1="104" x2="200" y2="159"/>
    <!-- lower frame — left side, bottom edge, right side -->
    <path d="M 72 249 V 279 H 328 V 249"/>
    <!-- stand neck -->
    <line x1="200" y1="304" x2="200" y2="324"/>
    <!-- stand base (filled trapezoid): top-left → top-right → bottom-right → bottom-left -->
    <polygon points="136,324 264,324 280,350 120,350" class="f"/>
  </g>
</svg>
