<!--
    DEV-ONLY ENTRY POINT
    ====================
    This file is the Vite dev server entry point (required to be named index.html
    at the project root per Vite convention). It is NOT used in production builds;
    the real HTML is generated by the Rust build script from
    frontend/src/page.template.html.

    It activates demo mode (demoSubpath: "") so the frontend works without a
    running backend. All build-data fields are placeholder values.
-->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>[DEV] ShutHost</title>
    <link rel="icon" href="/src/generated/favicon.svg" type="image/svg+xml" />
    <!-- Dev-mode data islands: all fields are placeholders (unused by Vite dev server). -->
    <script id="build-data" type="application/json">{
        "stylesHash": "dev",
        "stylesIntegrity": "dev",
        "manifestHash": "dev",
        "iconHashes": {},
        "svgHashes": { "favicon": "dev" },
        "description": "dev",
        "repository": "dev",
        "version": "dev",
        "appJsHash": "dev",
        "appJsIntegrity": "dev"
    }</script>
    <!-- Demo mode: demoSubpath="" activates demo mode at root; no backend needed. -->
    <script id="server-data" type="application/json">{
        "configPath": "/etc/shuthost/shuthost_coordinator.toml",
        "authWarning": false,
        "demoSubpath": "",
        "authMode": "disabled",
        "broadcastPort": 9001,
        "dbEnabled": true
    }</script>
    <script type="module" defer src="/src/index.tsx"></script>
</head>

<body>
<div id="app"></div>
</body>

</html>
