- main:
  - region "Install Host Agent":
    - group "Install Host Agent":
      - heading "Install Host Agent" [level=2]
  - region "Hosts Table":
    - heading "Hosts Table" [level=2]
    - table:
      - rowgroup:
        - row "Host Status Actions Leases":
          - columnheader "Host"
          - columnheader "Status"
          - columnheader "Actions"
          - columnheader "Leases"
      - rowgroup:
        - row "archive Status Actions Leases":
          - rowheader "archive":
            - link "archive":
              - /url: /hosts/archive
          - cell "Status": offline
          - cell "Actions":
            - button "Take Lease"
          - cell "Leases"
        - row "tarbean Status Actions Leases":
          - rowheader "tarbean":
            - link "tarbean":
              - /url: /hosts/tarbean
          - cell "Status": offline
          - cell "Actions":
            - button "Take Lease"
          - cell "Leases"