name: shuthost-frontend
private: true
type: module
engines: {node: '>=22.18.0'}
scripts:
  typecheck: tsc --noEmit
  build: vite build
  build:diagrams: node build-diagrams.ts
  build:prerender: vite-node --config vite.config.ssr.ts prerender.tsx
  test: playwright test
  install-chromium: playwright install chromium
  install-chromium-ci: playwright install chromium --with-deps
  lint: biome check .
  lint:fix: biome check --write .
  fmt: biome format --write .
dependencies:
  '@solidjs/meta': ^0.29.4
  '@solidjs/router': ^0.16.1
  solid-js: ^1.9.12
  tailwindcss: ^4.2.2
  typescript: ^6.0.2
devDependencies:
  '@axe-core/playwright': ^4.11.1
  '@biomejs/biome': ^2.4.10
  '@playwright/test': ^1.59.1
  '@tailwindcss/vite': ^4.2.2
  '@terrastruct/d2': ^0.1.33
  '@types/node': ~25.5.0
  vite: ^8.0.3
  vite-node: ^6.0.0
  vite-plugin-solid: ^2.11.11
