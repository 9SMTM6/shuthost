[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-unknown-linux-musl",
    "aarch64-unknown-linux-musl",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
    "x86_64-pc-windows-msvc",
    "aarch64-pc-windows-msvc",
]
all-features = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"

# leaving this here for reference. Https links please.
allow-git = [
    # "https://github.com/chemicstry/wasm_thread",
]

[advisories]
ignore = [
    { id = "RUSTSEC-2023-0071", reason = "AFAICT exploiting this would require the attacker to be able to control the OIDC provider / set the OIDC provider, at which point several other layers of security already failed." },
]

[bans]
# Is a duplicate of rustc::multiple_crate_versions
multiple-versions = "warn"

skip-tree = [
    { crate = "windows-sys:<0.61.2", depth = 3, reason = "several crates use outdated versions" },
]

[[bans.deny]]
name = "ring"
use-instead = "aws-lc-rs"
wrappers = [
    # cargo-about is a build-dependency that pulls in `ring`.
    "cargo-about",
    # come in via indirect dependency of cargo-about
    "rustls", "rustls-webpki"
]

[[bans.deny]]
name = "openssl"
use-instead = "aws-lc-rs"

[[bans.deny]]
name = "syn"
# deny-multiple-versions makes this essentially a blacklist for multiple versions of the crate
# instead of blacklisting the crate in general.
deny-multiple-versions = true
reason = "multiple versions of this increases build time significantly"

[[bans.deny]]
name = "proc-macro2"
deny-multiple-versions = true
reason = "multiple versions of this increases build time significantly"

[[bans.deny]]
name = "rustls"
deny-multiple-versions = true
reason = "multiple versions of this could lead to subtle bugs or unpredicted panics"

[[bans.deny]]
name = "tracing"
deny-multiple-versions = true
reason = "multiple versions of this could lead to subtle bugs or unpredicted panics"

[[bans.deny]]
name = "tokio"
deny-multiple-versions = true
reason = "multiple versions of this could lead to subtle bugs or unpredicted panics"

[bans.workspace-dependencies]
duplicates = 'deny'
include-path-dependencies = true
unused = 'deny'

# TODO: investigate in the future. But this has issues, as listed in the cargo deny book, and doesnt get checked befofe execution, so its certainly not perfect. 
# [bans.build]
# allow-build-scripts = []

[licenses]
allow = [
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "GPL-2.0-only",
    "ISC",
    "MIT",
    "Unicode-3.0",
    "Zlib",
]
