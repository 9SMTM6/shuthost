[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-unknown-linux-musl",
    "aarch64-unknown-linux-musl",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
    "x86_64-pc-windows-msvc",
    "aarch64-pc-windows-msvc",
]
all-features = true
# cargo-about is a build-dependency that transitively pulls in `ring`.
# Excluding it removes ring (and its exclusive transitive deps) from the graph,
# so the `ring` ban below won't trigger for build-deps while still catching
# any accidental ring usage introduced via normal dependencies.
exclude = ["cargo-about"]

[sources]
unknown-registry = "deny"
unknown-git = "deny"

# leaving this here for reference. Https links please.
allow-git = [
    # "https://github.com/chemicstry/wasm_thread",
]

[advisories]
ignore = [
    { id = "RUSTSEC-2023-0071", reason = "AFAICT exploiting this would require the attacker to be able to control the OIDC provider / set the OIDC provider, at which point several other layers of security already failed." },
]

[bans]
# Is a duplicate of rustc::multiple_crate_versions
multiple-versions = "warn"

deny = [
    { name = "openssl" },
    { name = "ring" },
]

skip-tree = [
    { crate = "windows-sys:<0.61.2", depth = 3, reason = "several crates use outdated versions" },
]

[bans.workspace-dependencies]
duplicates = 'deny'
include-path-dependencies = true
unused = 'deny'

# TODO: investigate in the future. But this has issues, as listed in the cargo deny book, and doesnt get checked befofe execution, so its certainly not perfect. 
# [bans.build]
# allow-build-scripts = []

[licenses]
allow = [
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "GPL-2.0-only",
    "ISC",
    "MIT",
    "Unicode-3.0",
    "Zlib",
]
